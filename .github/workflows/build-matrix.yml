# Security review (per security_reminder_hook.py):
# This workflow uses ${{ ... }} only for trusted contexts:
#   - vars.CI_BUILD_MATRIX_ENABLED (repo variable, trusted)
#   - matrix.* values (defined inline in this file, trusted)
#   - github.event_name, github.ref, github.workspace, runner.* (trusted)
# No untrusted PR/issue/commit text (github.event.issue.*, head_ref, etc.)
# is ever interpolated into a run: step.

name: Build Matrix

# Cross-platform packaged-build verification for the Wayland fork.
# Runs on push to main and on a weekly nightly schedule.
#
# Feature-flagged: only runs when repository variable
# `CI_BUILD_MATRIX_ENABLED == 'true'`. Default OFF, because GitHub
# charges for non-public-repo runner minutes on macOS / Windows.
#
# Enable for the repo:
#   gh variable set CI_BUILD_MATRIX_ENABLED --body 'true'
# Disable:
#   gh variable set CI_BUILD_MATRIX_ENABLED --body 'false'
#
# Manual trigger (always honored, regardless of the flag):
#   gh workflow run build-matrix.yml

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'design-mockups/**'
      - '.planning/**'
      - '.blackboard/**'
  schedule:
    # Weekly nightly: Mondays at 09:00 UTC.
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: build-matrix-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Wayland-core release stream does not exist yet (see commit 48d155826).
  WCORE_SKIP: '1'
  CI: 'true'
  NODE_OPTIONS: '--max-old-space-size=8192'

jobs:
  # Gate-on-flag: skip the matrix when the repo variable is not 'true'.
  # workflow_dispatch always runs (intentional, for manual smoke tests).
  preflight:
    name: Preflight (feature flag)
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.flag.outputs.enabled }}
    steps:
      - id: flag
        env:
          FLAG: ${{ vars.CI_BUILD_MATRIX_ENABLED }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ] || [ "$FLAG" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Build matrix enabled (event=$EVENT, flag=$FLAG)."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Build matrix DISABLED. Set repo variable CI_BUILD_MATRIX_ENABLED=true to enable."
          fi

  build:
    name: Build (${{ matrix.platform }})
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-14
            build_script: build-mac
          - platform: macos-x64
            os: macos-13
            build_script: build-mac
          - platform: windows-x64
            os: windows-latest
            build_script: build-win
          - platform: linux-x64
            os: ubuntu-latest
            build_script: build-deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          # Pinned versions (node = 24, bun = 1.3, just = 1.51) live in
          # ../mise.toml at the workspace root, one level above app/.
          install: true
          cache: true
        continue-on-error: true

      - name: Setup Node.js (fallback if mise did not pick up workspace toml)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun (fallback if mise did not pick up workspace toml)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Cache Bun + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: build-matrix-bun-${{ matrix.platform }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            build-matrix-bun-${{ matrix.platform }}-

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential python3 python3-pip pkg-config \
            libsqlite3-dev fakeroot dpkg-dev rpm \
            libnss3-dev libatk-bridge2.0-dev libdrm2 libxkbcommon-dev \
            libxss1 libatspi2.0-dev libgtk-3-dev libxrandr2 libasound2-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Postinstall (CI uses prebuilt binaries; see scripts/postinstall.js)
        run: bun run postinstall || true

      - name: Cache Electron artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/.cache/electron
            ${{ runner.temp }}/.cache/electron-builder
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ matrix.platform }}-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            electron-${{ matrix.platform }}-

      - name: Run packaged build
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/.cache/electron-builder
          # matrix.build_script is defined inline above (trusted).
          BUILD_SCRIPT: ${{ matrix.build_script }}
          # Ad-hoc / unsigned by default. On macOS, electron-builder will
          # skip signing when CSC_LINK is unset; this also disables Keychain
          # autodiscovery on hosted runners.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        shell: bash
        run: bun run "$BUILD_SCRIPT"

      - name: List build output
        if: always()
        shell: bash
        run: ls -lah out || true

      - name: Verify build artifacts exist
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          case "$PLATFORM" in
            macos-*)
              ls out/*.dmg out/*.zip >/dev/null
              ;;
            windows-*)
              ls out/*.exe >/dev/null
              ;;
            linux-*)
              ls out/*.deb >/dev/null
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wayland-${{ matrix.platform }}
          path: |
            out/*.dmg
            out/*.zip
            out/*.exe
            out/*.deb
            out/*latest*.yml
          if-no-files-found: warn
          retention-days: 14
